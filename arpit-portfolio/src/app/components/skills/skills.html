<section id="skills" class="section skills-section">
  <div class="container">
    <div class="section-label">Expertise</div>
    <h2 class="section-title">Technical <span class="accent">Skills</span></h2>

    <div class="category-tabs">
      @for (cat of categories(); track cat) {
        <button class="cat-tab" [class.active]="activeCategory() === cat" (click)="setCategory(cat)">{{ cat }}</button>
      }
    </div>

    <div class="skills-grid">
      @for (skill of filteredSkills(); track skill.name; let i = $index) {
        <div class="skill-item">
          <div class="skill-header">
            <span class="skill-name">{{ skill.name }}</span>
            <span class="skill-pct">{{ skill.level }}%</span>
          </div>
          <div class="skill-bar-bg">
            <div class="skill-bar-fill"
              [style.width.%]="animated() ? skill.level : 0"
              [style.transition-delay]="(i * 80) + 'ms'">
            </div>
          </div>
        </div>
      }
    </div>

    <div class="all-skills-cloud">
      <div class="cloud-label">Full stack</div>
      <div class="cloud-tags">
        @for (s of portfolio.skills(); track s.name) {
          <span class="cloud-tag" [style.fontSize]="(0.7 + s.level * 0.005) + 'rem'">{{ s.name }}</span>
        }
      </div>
    </div>
  </div>
</section>
