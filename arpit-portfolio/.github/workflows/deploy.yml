name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build main portfolio
        working-directory: arpit-portfolio
        run: |
          npm ci --legacy-peer-deps
          npm run build:gh-pages

      - name: Combine site for GitHub Pages
        run: |
          mkdir -p combined
          cp -r arpit-portfolio/dist/arpit-portfolio/browser combined/arpit-portfolio
          cp arpit-portfolio/public/404.html combined/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './combined'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
