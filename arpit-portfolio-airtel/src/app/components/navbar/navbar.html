<nav class="navbar" [class.scrolled]="scrolled">
  <div class="nav-container">
    <a class="nav-brand" (click)="scrollTo('#hero', 'hero')">
      <svg class="brand-blob" width="36" height="36" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="48" fill="#d73737"/>
        <path d="M50 22c-7 11-18 17-18 30 0 10 8 18 18 18s18-8 18-18c0-13-11-19-18-30z" fill="white"/>
      </svg>
      <span class="brand-name">{{ portfolio.profile().name }}</span>
    </a>

    <ul class="nav-links" [class.open]="menuOpen">
      @for (link of navLinks; track link.label) {
        <li [class.active]="isActive(link.id)">
          <a class="nav-link" (click)="scrollTo(link.href, link.id)">{{ link.label }}</a>
        </li>
      }
      <li class="resume-item">
        <a class="nav-link resume-btn" [href]="portfolio.resumePdfUrl()" download="Arpit_Sangal_Resume.pdf">
          Download Resume
        </a>
      </li>
    </ul>

    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
      <span [class.open]="menuOpen"></span>
      <span [class.open]="menuOpen"></span>
      <span [class.open]="menuOpen"></span>
    </button>
  </div>
</nav>
