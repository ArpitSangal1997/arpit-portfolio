<footer class="footer">
  <div class="footer-container">
    <div class="footer-brand">
      <span class="brand-init">{{ portfolio.profile().firstName[0] }}{{ portfolio.profile().lastName[0] }}</span>
      <span>{{ portfolio.profile().name }}</span>
    </div>
    <p class="footer-copy">© {{ year }} {{ portfolio.profile().name }} · Built with Angular 20</p>
    <div class="footer-links">
      <a [href]="portfolio.profile().github.url" target="_blank" rel="noopener">GitHub</a>
      <a [href]="portfolio.profile().linkedin.url" target="_blank" rel="noopener">LinkedIn</a>
      <a [href]="'mailto:' + portfolio.profile().email">Email</a>
    </div>
  </div>
</footer>
