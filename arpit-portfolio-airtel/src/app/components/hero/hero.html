<section id="hero" class="hero">
  <div class="hero-inner container">
    <div class="hero-content">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        MetroTelWorks · Airtel Ecosystem
      </div>

      <h1 class="hero-name">
        Hi, I'm {{ portfolio.profile().firstName }}<br>
        <span class="accent">{{ portfolio.profile().lastName }}</span>
      </h1>

      <p class="hero-title">{{ portfolio.profile().title }}</p>
      <p class="hero-desc">{{ portfolio.profile().tagline }}</p>

      <div class="hero-actions">
        <button class="btn-primary" (click)="scrollTo('#experience')">Explore my work</button>
        <button class="btn-secondary" (click)="scrollTo('#contact')">Get in touch</button>
      </div>
    </div>

    <div class="hero-visual">
      <div class="stat-panel card-3d">
        @for (stat of portfolio.stats(); track stat.label) {
          <div class="stat">
            <span class="stat-num">{{ stat.value }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        }
      </div>
      <svg class="hero-blob" viewBox="0 0 200 200" aria-hidden="true">
        <path fill="#d73737" d="M45.9,-58.1C58.7,-47.8,68.4,-32.8,71.2,-16.1C74,0.6,69.9,18.9,59.8,33.2C49.7,47.5,33.6,57.8,16.1,63.4C-1.4,69,-19.3,69.9,-34.8,62.1C-50.3,54.3,-63.4,37.8,-68.5,19.1C-73.6,0.4,-70.7,-20.5,-59.8,-36.1C-48.9,-51.7,-30,-62,-11.2,-63.5C7.6,-65,33.1,-68.4,45.9,-58.1Z" transform="translate(100 100)"/>
      </svg>
    </div>
  </div>
</section>
